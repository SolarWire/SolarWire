<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 523" width="380" height="523">
<style>
  text { font-family: Arial, sans-serif; }
  .note-badge { fill: #e74c3c; }
  .note-badge-text { fill: white; font-size: 12px; font-weight: bold; }
  .note-card { fill: #f8f9fa; stroke: #dee2e6; stroke-width: 1; }
  .note-card-text { fill: #333; font-size: 12px; line-height: 22px; }
  .note-card-badge { fill: #e74c3c; }
  .note-card-badge-text { fill: white; font-size: 10px; font-weight: bold; }
</style>
<rect x="20" y="20" width="150" height="50" fill="lightgray" stroke="#333333" stroke-width="1"/><text x="95" y="49" text-anchor="middle" fill="blue" font-size="12" >矩形示例</text><title>这是一个矩形</title>
<rect x="200" y="20" width="150" height="50" rx="10" ry="10" fill="#fff0c0" stroke="#333333" stroke-width="1"/><text x="275" y="49" text-anchor="middle" fill="#333" font-size="12" >圆角矩形</text><title>这是一个圆角矩形</title>
<circle cx="50" cy="130" r="30" fill="#90EE90" stroke="#333333" stroke-width="1"/><text x="50" y="130" text-anchor="middle" dominant-baseline="middle" fill="#333" font-size="12" >圆形</text><title>圆形头像</title>
<rect x="20" y="180" width="100" height="40" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="70" y="204" text-anchor="middle" fill="#333" font-size="12" font-weight="bold" >粗体</text>
<rect x="100" y="180" width="100" height="40" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="150" y="204" text-anchor="middle" fill="#333" font-size="12" font-style="italic" >斜体</text>
<rect x="180" y="180" width="100" height="40" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="230" y="204" text-anchor="middle" fill="#333" font-size="12" >居中</text>
<rect x="260" y="180" width="100" height="40" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="310" y="204" text-anchor="middle" fill="#333" font-size="12" >右对齐</text>
<rect x="20" y="250" width="176" height="43" fill="#e8f4fc" stroke="none" stroke-width="0"/><rect x="28" y="258" width="80" height="35" fill="#4CAF50" stroke="#333333" stroke-width="1"/><text x="68" y="279.5" text-anchor="middle" fill="white" font-size="12" >按钮1</text><rect x="116" y="258" width="80" height="35" fill="#2196F3" stroke="#333333" stroke-width="1"/><text x="156" y="279.5" text-anchor="middle" fill="white" font-size="12" >按钮2</text>
  <circle cx="162" cy="12" r="10" class="note-badge"/>
  <text x="162" y="16" text-anchor="middle" class="note-badge-text">1</text>
  <circle cx="342" cy="12" r="10" class="note-badge"/>
  <text x="342" y="16" text-anchor="middle" class="note-badge-text">2</text>
  <circle cx="72" cy="92" r="10" class="note-badge"/>
  <text x="72" y="96" text-anchor="middle" class="note-badge-text">3</text>
  <rect x="20" y="343" width="165" height="60" rx="8" class="note-card"/>
  <circle cx="32" cy="355" r="8" class="note-card-badge"/>
  <text x="32" y="358" text-anchor="middle" class="note-card-badge-text">1</text>
  <text x="48" y="355" fill="#333" font-size="12" dominant-baseline="hanging">
    <tspan x="48">这是一个矩形</tspan>
  </text>
  <rect x="195" y="343" width="165" height="60" rx="8" class="note-card"/>
  <circle cx="207" cy="355" r="8" class="note-card-badge"/>
  <text x="207" y="358" text-anchor="middle" class="note-card-badge-text">2</text>
  <text x="223" y="355" fill="#333" font-size="12" dominant-baseline="hanging">
    <tspan x="223">这是一个圆角矩形</tspan>
  </text>
  <rect x="20" y="413" width="165" height="60" rx="8" class="note-card"/>
  <circle cx="32" cy="425" r="8" class="note-card-badge"/>
  <text x="32" y="428" text-anchor="middle" class="note-card-badge-text">3</text>
  <text x="48" y="425" fill="#333" font-size="12" dominant-baseline="hanging">
    <tspan x="48">圆形头像</tspan>
  </text>
</svg>