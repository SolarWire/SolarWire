<text x="50" y="50" text-anchor="start" fill="#333" font-size="20" font-weight="bold" >=== SolarWire Complete Feature Demo ===</text><title>Main title for this comprehensive SolarWire feature showcase</title>
<text x="50" y="96" text-anchor="start" fill="#333" font-size="16" font-weight="bold" >=== Basic Elements ===</text><title>Section showcasing basic SolarWire elements</title>
<rect x="50" y="110" width="120" height="50" fill="lightblue" stroke="#333333" stroke-width="1"/><text x="110" y="139" text-anchor="middle" fill="blue" font-size="12" >Rectangle</text><title>Basic rectangle element with custom colors</title>
<rect x="180" y="110" width="120" height="50" rx="10" ry="10" fill="#fff0c0" stroke="#333333" stroke-width="1"/><text x="240" y="139" text-anchor="middle" fill="#333" font-size="12" >Rounded</text><title>Rounded rectangle with custom border radius</title>
<circle cx="330" cy="145" r="20" fill="#90EE90" stroke="#333333" stroke-width="1"/><text x="330" y="145" text-anchor="middle" dominant-baseline="middle" fill="#333" font-size="12" >Circle</text><title>Circle element for avatar or icon display</title>
<text x="50" y="202" text-anchor="start" fill="#333" font-size="12" >Text Element</text><title>Basic standalone text element</title>
<text x="150" y="202" text-anchor="start" fill="#333" font-size="12" font-weight="bold" >Bold Text</text><title>Text with bold styling</title>
<text x="250" y="202" text-anchor="start" fill="#333" font-size="12" font-style="italic" >Italic Text</text><title>Text with italic styling</title>
<text x="350" y="202" text-anchor="start" fill="#333" font-size="12" font-weight="bold" font-style="italic" >Both Styles</text><title>Text with both bold and italic</title>
<rect x="50" y="230" width="200" height="80" fill="#ffffff" stroke="#999999" stroke-width="1"/><line x1="50" y1="230" x2="250" y2="310" stroke="#999999" stroke-width="1"/><line x1="250" y1="230" x2="50" y2="310" stroke="#999999" stroke-width="1"/><text x="150" y="270" text-anchor="middle" dominant-baseline="middle" fill="#333" font-size="12">Placeholder</text><title>Placeholder element for missing content</title>
<rect x="270" y="230" width="200" height="80" fill="#ffffff"/><g transform="translate(358, 246)"><rect x="0" y="0" width="24" height="24" fill="none" stroke="#333" stroke-width="2" rx="4"/><path d="M4.800000000000001 7.199999999999999 L12 14.399999999999999 L19.200000000000003 7.199999999999999" fill="none" stroke="#333" stroke-width="2"/><circle cx="8.399999999999999" cy="9.600000000000001" r="1.92" fill="#333"/></g><text x="370" y="282" text-anchor="middle" fill="#333" font-size="12">Image</text><image x="270" y="230" width="200" height="80" href="https://example.com/hero.jpg"/><title>Image element with URL - shows placeholder when not loaded</title>
