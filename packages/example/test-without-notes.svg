<text x="50" y="376" text-anchor="start" fill="#333" font-size="16" font-weight="bold" >=== Relative Positioning ===</text><title>Section demonstrating relative coordinates</title>
<rect x="50" y="390" width="150" height="50" fill="#e8f4fc" stroke="#333333" stroke-width="1"/><text x="125" y="419" text-anchor="middle" fill="#333" font-size="12" >Absolute</text><title>Element with absolute coordinates</title>
<rect x="210" y="390" width="150" height="50" fill="#fff3e0" stroke="#333333" stroke-width="1"/><text x="285" y="419" text-anchor="middle" fill="#333" font-size="12" >Right of Edge</text><title>Element positioned at Right+10, Top+0 of previous</title>
<rect x="210" y="450" width="150" height="50" fill="#e8f5e9" stroke="#333333" stroke-width="1"/><text x="285" y="479" text-anchor="middle" fill="#333" font-size="12" >Below Edge</text><title>Element positioned at Left+0, Bottom+10 of previous</title>
<rect x="50" y="520" width="200" height="60" fill="#fce4ec" stroke="#333333" stroke-width="1"/><text x="150" y="554" text-anchor="middle" fill="#333" font-size="12" >Edge Reference</text><title>Element used as edge reference</title>
<rect x="260" y="520" width="150" height="60" fill="#f3e5f5" stroke="#333333" stroke-width="1"/><text x="335" y="554" text-anchor="middle" fill="#333" font-size="12" >Right of Reference</text><title>Element positioned at Right+10, Top+0 of previous</title>
<rect x="260" y="590" width="150" height="60" fill="#e0f7fa" stroke="#333333" stroke-width="1"/><text x="335" y="624" text-anchor="middle" fill="#333" font-size="12" >Bottom of Reference</text><title>Element positioned at Left+0, Bottom+10 of previous</title>
<line x1="50" y1="630" x2="950" y2="630" stroke="gray" stroke-width="1"/><title>Divider after relative positioning section</title>
<text x="50" y="676" text-anchor="start" fill="#333" font-size="16" font-weight="bold" >=== Table with colspan/rowspan ===</text><title>Section demonstrating table with colspan and rowspan</title>
<rect x="50" y="690" width="400" height="40" fill="#4CAF50" stroke="#333333" stroke-width="1"/><rect x="50" y="690" width="400" height="40" fill="#4CAF50" stroke="#333333" stroke-width="1"/><text x="250" y="714" text-anchor="middle" fill="white" font-size="12" font-weight="bold" >Header 1</text><title>Table header spanning 2 columns</title><rect x="450" y="690" width="200" height="40" fill="#4CAF50" stroke="#333333" stroke-width="1"/><rect x="450" y="690" width="200" height="40" fill="#4CAF50" stroke="#333333" stroke-width="1"/><text x="550" y="714" text-anchor="middle" fill="white" font-size="12" font-weight="bold" >Header 2</text><title>Regular table header</title><rect x="50" y="730" width="200" height="80" fill="#e8f5e9" stroke="#333333" stroke-width="1"/><rect x="50" y="730" width="200" height="80" fill="#e8f5e9" stroke="#333333" stroke-width="1"/><text x="150" y="774" text-anchor="middle" fill="#333" font-size="12" >Merged</text><title>Table cell spanning 2 rows</title><rect x="250" y="730" width="200" height="40" fill="#f5f5f5" stroke="#333333" stroke-width="1"/><rect x="250" y="730" width="200" height="40" fill="#f5f5f5" stroke="#333333" stroke-width="1"/><text x="350" y="754" text-anchor="middle" fill="#333" font-size="12" >Cell A1</text><title>Regular table cell</title><rect x="450" y="730" width="200" height="40" fill="#f5f5f5" stroke="#333333" stroke-width="1"/><rect x="450" y="730" width="200" height="40" fill="#f5f5f5" stroke="#333333" stroke-width="1"/><text x="550" y="754" text-anchor="middle" fill="#333" font-size="12" >Cell A2</text><title>Regular table cell</title><rect x="250" y="770" width="200" height="40" fill="#ffffff" stroke="#333333" stroke-width="1"/><rect x="250" y="770" width="200" height="40" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="350" y="794" text-anchor="middle" fill="#333" font-size="12" >Cell B1</text><title>Regular table cell - notice the merged cell above</title><rect x="450" y="770" width="200" height="40" fill="#ffffff" stroke="#333333" stroke-width="1"/><rect x="450" y="770" width="200" height="40" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="550" y="794" text-anchor="middle" fill="#333" font-size="12" >Cell B2</text><title>Regular table cell</title><rect x="50" y="810" width="600" height="40" fill="#2196F3" stroke="#333333" stroke-width="1"/><rect x="50" y="810" width="600" height="40" fill="#2196F3" stroke="#333333" stroke-width="1"/><text x="350" y="834" text-anchor="middle" fill="white" font-size="12" font-weight="bold" >Footer</text><title>Table footer spanning all 3 columns</title><rect x="50" y="690" width="600" height="160" fill="none" stroke="#333333" stroke-width="1"/><title>Complete table demonstrating colspan and rowspan features</title>
<rect x="50" y="890" width="480" height="50" fill="#9C27B0" stroke="#333333" stroke-width="1"/><rect x="50" y="890" width="480" height="50" fill="#9C27B0" stroke="#333333" stroke-width="1"/><text x="290" y="919" text-anchor="middle" fill="white" font-size="12" font-weight="bold" >Title</text><title>Header spanning all 4 columns</title><rect x="50" y="940" width="120" height="150" fill="#FFC107" stroke="#333333" stroke-width="1"/><rect x="50" y="940" width="120" height="150" fill="#FFC107" stroke="#333333" stroke-width="1"/><text x="110" y="1019" text-anchor="middle" fill="#333" font-size="12" >Menu</text><title>Side menu spanning 3 rows</title><rect x="170" y="940" width="120" height="50" fill="#FFF3E0" stroke="#333333" stroke-width="1"/><rect x="170" y="940" width="120" height="50" fill="#FFF3E0" stroke="#333333" stroke-width="1"/><text x="230" y="969" text-anchor="middle" fill="#333" font-size="12" >Item 1</text><title>Regular item</title><rect x="290" y="940" width="120" height="50" fill="#FFF3E0" stroke="#333333" stroke-width="1"/><rect x="290" y="940" width="120" height="50" fill="#FFF3E0" stroke="#333333" stroke-width="1"/><text x="350" y="969" text-anchor="middle" fill="#333" font-size="12" >Item 2</text><title>Regular item</title><rect x="410" y="940" width="240" height="50" fill="#FFE0B2" stroke="#333333" stroke-width="1"/><rect x="410" y="940" width="240" height="50" fill="#FFE0B2" stroke="#333333" stroke-width="1"/><text x="530" y="969" text-anchor="middle" fill="#333" font-size="12" >Item 3</text><title>Item spanning 2 columns</title><rect x="170" y="990" width="120" height="50" fill="#E3F2FD" stroke="#333333" stroke-width="1"/><rect x="170" y="990" width="120" height="50" fill="#E3F2FD" stroke="#333333" stroke-width="1"/><text x="230" y="1019" text-anchor="middle" fill="#333" font-size="12" >Detail A</text><title>Detail cell A</title><rect x="290" y="990" width="120" height="50" fill="#E3F2FD" stroke="#333333" stroke-width="1"/><rect x="290" y="990" width="120" height="50" fill="#E3F2FD" stroke="#333333" stroke-width="1"/><text x="350" y="1019" text-anchor="middle" fill="#333" font-size="12" >Detail B</text><title>Detail cell B</title><rect x="170" y="1040" width="360" height="50" fill="#4CAF50" stroke="#333333" stroke-width="1"/><rect x="170" y="1040" width="360" height="50" fill="#4CAF50" stroke="#333333" stroke-width="1"/><text x="350" y="1069" text-anchor="middle" fill="white" font-size="12" font-weight="bold" >Summary</text><title>Summary spanning 3 columns</title><rect x="50" y="890" width="600" height="200" fill="none" stroke="#333333" stroke-width="1"/><title>Advanced table with multiple colspan and rowspan combinations</title>
<line x1="50" y1="1120" x2="950" y2="1120" stroke="gray" stroke-width="1"/><title>Another divider line</title>
<text x="50" y="1166" text-anchor="start" fill="#333" font-size="16" font-weight="bold" >=== Containers and Layout ===</text><title>Section demonstrating row and column containers</title>
<rect x="50" y="1180" width="900" height="100" fill="#ffffff" stroke="none" stroke-width="0"/><rect x="60" y="1190" width="150" height="80" fill="#ffcccb" stroke="#333333" stroke-width="1"/><text x="135" y="1234" text-anchor="middle" fill="#333" font-size="12" >Left</text><title>First element in row container - notice gap from left</title><rect x="220" y="1190" width="150" height="80" fill="#ffffcc" stroke="#333333" stroke-width="1"/><text x="295" y="1234" text-anchor="middle" fill="#333" font-size="12" >Center</text><title>Second element in row container</title><rect x="380" y="1190" width="150" height="80" fill="#ccffcc" stroke="#333333" stroke-width="1"/><text x="455" y="1234" text-anchor="middle" fill="#333" font-size="12" >Right</text><title>Third element in row container</title><title>Row container arranging elements horizontally with gap</title>
<rect x="50" y="1300" width="300" height="150" fill="#ffffff" stroke="none" stroke-width="0"/><rect x="60" y="1310" width="280" height="40" fill="#e8f4fc" stroke="#333333" stroke-width="1"/><text x="200" y="1334" text-anchor="middle" fill="#333" font-size="12" >Top</text><title>Top element in column container - notice gap from top</title><rect x="60" y="1360" width="280" height="40" fill="#fce4ec" stroke="#333333" stroke-width="1"/><text x="200" y="1384" text-anchor="middle" fill="#333" font-size="12" >Middle</text><title>Middle element in column container</title><rect x="60" y="1410" width="280" height="40" fill="#f3e5f5" stroke="#333333" stroke-width="1"/><text x="200" y="1434" text-anchor="middle" fill="#333" font-size="12" >Bottom</text><title>Bottom element in column container</title><title>Column container arranging elements vertically with gap</title>
<rect x="370" y="1300" width="580" height="150" fill="#ffffff" stroke="none" stroke-width="0"/><rect x="380" y="1310" width="185" height="120" fill="#ffffff" stroke="none" stroke-width="0"/><rect x="385" y="1315" width="180" height="35" fill="#fff3e0" stroke="#333333" stroke-width="1"/><text x="475" y="1336.5" text-anchor="middle" fill="#333" font-size="12" >Nested 1</text><title>First nested column</title><rect x="385" y="1355" width="180" height="35" fill="#e0f7fa" stroke="#333333" stroke-width="1"/><text x="475" y="1376.5" text-anchor="middle" fill="#333" font-size="12" >Nested 2</text><title>Second nested column</title><rect x="385" y="1395" width="180" height="35" fill="#f1f8e9" stroke="#333333" stroke-width="1"/><text x="475" y="1416.5" text-anchor="middle" fill="#333" font-size="12" >Nested 3</text><title>Third nested column</title><rect x="575" y="1310" width="185" height="120" fill="#ffffff" stroke="none" stroke-width="0"/><rect x="580" y="1315" width="180" height="35" fill="#ffebee" stroke="#333333" stroke-width="1"/><text x="670" y="1336.5" text-anchor="middle" fill="#333" font-size="12" >Nested A</text><title>Fourth nested column</title><rect x="580" y="1355" width="180" height="35" fill="#f3e5f5" stroke="#333333" stroke-width="1"/><text x="670" y="1376.5" text-anchor="middle" fill="#333" font-size="12" >Nested B</text><title>Fifth nested column</title><rect x="580" y="1395" width="180" height="35" fill="#e8eaf6" stroke="#333333" stroke-width="1"/><text x="670" y="1416.5" text-anchor="middle" fill="#333" font-size="12" >Nested C</text><title>Sixth nested column</title><title>Nested containers - row containing columns</title>
<line x1="50" y1="1470" x2="950" y2="1470" stroke="gray" stroke-width="1"/><title>Final divider line</title>
<text x="50" y="1516" text-anchor="start" fill="#333" font-size="16" font-weight="bold" >=== Complex Note Examples ===</text><title>Section demonstrating complex note content with multiple notes</title>
<rect x="50" y="1530" width="250" height="60" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="175" y="1564" text-anchor="middle" fill="#333" font-size="12" >Multi-line Note</text><title>This is a multi-line note.
It contains several lines of text
to demonstrate how notes with
longer content are displayed
in the card area at the bottom.</title>
<rect x="320" y="1530" width="250" height="60" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="445" y="1564" text-anchor="middle" fill="#333" font-size="12" >List Note</text><title>- First list item
- Second list item with more details
- Third list item with even more information
- Fourth item to complete the list</title>
<rect x="590" y="1530" width="250" height="60" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="715" y="1564" text-anchor="middle" fill="#333" font-size="12" >Numbered Note</text><title>1. First numbered item
2. Second numbered item
3. Third numbered item with description
4. Fourth numbered item</title>
<rect x="50" y="1610" width="380" height="60" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="240" y="1644" text-anchor="middle" fill="#333" font-size="12" >Mixed Note</text><title>Important Features:
• Easy to learn syntax
• Powerful layout capabilities
• Flexible styling options
Key Benefits:
- Quick prototyping
- Clean visual output
- Export to SVG/PNG</title>
<rect x="450" y="1610" width="380" height="60" fill="#ffffff" stroke="#333333" stroke-width="1"/><text x="640" y="1644" text-anchor="middle" fill="#333" font-size="12" >Detailed Note</text><title>This element demonstrates
a very detailed note that
contains multiple paragraphs
and various types of content
to show the flexibility of
the note system in SolarWire.</title>
<text x="50" y="1714" text-anchor="start" fill="#333" font-size="14" >End of Demo - Check below for all notes!</text><title>Thank you for exploring SolarWire! Scroll down to see all note cards with their corresponding badges.</title>
